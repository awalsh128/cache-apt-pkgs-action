name: "Setup environment"
description: "Checks out code, sets up Node.js, and installs dependencies"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
      with:
        node-version: 24
        cache: "npm"

    - name: Install dependencies
      shell: bash
      run: npm ci
